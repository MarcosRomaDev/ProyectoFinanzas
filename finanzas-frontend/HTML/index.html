<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Finanzas</title>
    <link rel="stylesheet" href="../CSS/style.css" />
  </head>
  <body>
    <!-- Sección de Resumen (Dashboard) -->
    <div id="dashboard-resumen" class="dashboard-grid">
      <div class="card card-ingresos">
        <h3>Total Ingresos</h3>
        <p id="total-ingresos">0.00€</p>
      </div>
      <div class="card card-gastos">
        <h3>Total Gastos</h3>
        <p id="total-gastos">0.00€</p>
      </div>
      <div class="card card-balance">
        <h3>Balance Neto</h3>
        <p id="total-balance">0.00€</p>
      </div>
    </div>

    <h1>listado de transacciones</h1>
    <!-- Sección de controles de visualización -->

    <div class="table-controls">
      <button id="btn-actualizar">actualizar datos</button>

      <div class="sort-container">
        <label for="orden-fecha">ordenar por fecha:</label>
        <select id="orden-fecha">
          <option value="desc">más recientes primero</option>
          <option value="asc">más antiguas primero</option>
        </select>
      </div>

      <div class="filter">
        <label for="filtro-categoria">Filtrar por categorias</label>
        <select id="filtro-categoria">
          <option value="TODAS">Todas las categorias</option>
          <!-- El JS llenará el resto -->
        </select>
      </div>
    </div>
    <!-- Tabla de datos -->
    <table>
      <thead>
        <tr>
          <th>descripción</th>
          <th>importe</th>
          <th>categoría</th>
          <th>fecha</th>
          <th>acciones</th>
        </tr>
      </thead>
      <!-- El ID debe coincidir con el que busca TransactionView.js -->
      <tbody id="transactions-body">
        <!-- Inyectado dinámicamente por la View -->
      </tbody>
    </table>
    <!-- Formulario para añadir nuevas transacciones -->
    <section id="contenedor-formulario">
      <h2>nueva transacción</h2>
      <form id="transaccion-form">
        <div class="campo">
          <label for="descripcion">descripción:</label>
          <input
            type="text"
            id="descripcion"
            placeholder="ej: compra supermercado"
            required
          />
        </div>

        <div class="campo">
          <label for="monto">importe:</label>
          <input
            type="number"
            id="monto"
            step="0.01"
            placeholder="0.00"
            required
          />
        </div>

        <div class="campo">
          <label for="tipo">tipo:</label>
          <select id="tipo">
            <option value="GASTO">gasto</option>
            <option value="INGRESO">ingreso</option>
          </select>
        </div>

        <div class="campo">
          <label for="categoria-select">categoría:</label>
          <select id="categoria-select" required>
            <option value="">selecciona una categoría...</option>
          </select>
        </div>

        <div class="campo">
          <label for="fecha">fecha:</label>
          <input type="date" id="fecha" required />
        </div>

        <button type="submit">guardar transacción</button>
      </form>
    </section>

    <script type="module" src="../JavaScript/main.js"></script>
  </body>
</html>
