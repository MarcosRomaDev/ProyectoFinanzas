<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Finanzas</title>
    <!-- Vinculamos el CSS externo -->
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <h1>Listado de Transacciones</h1>
    <button onclick="cargarTransacciones()">Actualizar Datos</button>
    <br><br>

    <section id="contenedor-formulario">
        <h2>Nueva Transacción</h2>
        <form id="transaccion-form">
            <div class="campo">
                <label for="descripcion">Descripción:</label>
                <input type="text" id="descripcion" placeholder="Ej: Compra supermercado" required>
            </div>

            <div class="campo">
                <label for="monto">Importe:</label>
                <input type="number" id="monto" step="0.01" placeholder="0.00" required>
            </div>

            <div class="campo">
                <label for="tipo">Tipo:</label>
                <select id="tipo">
                    <option value="GASTO">Gasto</option>
                    <option value="INGRESO">Ingreso</option>
                </select>
            </div>

            <div class="campo">
                <label for="categoria-select">Categoría:</label>
                <select id="categoria-select" required>
                    <option value="">Cargando categorías...</option>
                </select>
            </div>

            <div class="campo">
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" required>
            </div>

            <button type="submit">Guardar Transacción</button>
        </form>
    </section>

    <table>
        <thead>
            <tr>
                <th>Descripción</th>
                <th>Importe</th>
                <th>Categoría</th>
                <th>Fecha</th>
                <th>Acciones</th> <!-- Nueva columna para el botón de borrar -->
            </tr>
        </thead>
        <tbody id="tabla-body">
            <!-- Los datos de Spring aparecerán aquí -->
        </tbody>
    </table>
    
    <script src="../JavaScript/app.js"></script>
</body>
</html>
