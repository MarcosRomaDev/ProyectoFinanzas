<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Finanzas</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <h1>Listado de Transacciones</h1>

    <!-- Sección de controles de visualización -->
    <div class="table-controls">
        <button onclick="loadTransactions(currentOrder)">Actualizar Datos</button>
        
        <div class="sort-container">
            <label for="orden-fecha">Ordenar por fecha:</label>
            <select id="orden-fecha" onchange="changeOrder()">
                <option value="desc">Más recientes primero</option>
                <option value="asc">Más antiguas primero</option>
            </select>
        </div>
    </div>

    <!-- Tabla de datos -->
    <table>
        <thead>
            <tr>
                <th>Descripción</th>
                <th>Importe</th>
                <th>Categoría</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="transactions-body"> <!-- ID actualizado para coincidir con JS -->
            <!-- Los datos de Spring aparecerán aquí -->
        </tbody>
    </table>

     <!-- Formulario para añadir nuevas transacciones -->
    <section id="contenedor-formulario">
        <h2>Nueva Transacción</h2>
        <form id="transaccion-form">
            <div class="campo">
                <label for="descripcion">Descripción:</label>
                <input type="text" id="descripcion" placeholder="Ej: Compra supermercado" required>
            </div>

            <div class="campo">
                <label for="monto">Importe:</label>
                <input type="number" id="monto" step="0.01" placeholder="0.00" required>
            </div>

            <div class="campo">
                <label for="tipo">Tipo:</label>
                <select id="tipo">
                    <option value="GASTO">Gasto</option>
                    <option value="INGRESO">Ingreso</option>
                </select>
            </div>

            <div class="campo">
                <label for="categoria-select">Categoría:</label>
                <select id="categoria-select" required>
                    <option value="">Cargando categorías...</option>
                </select>
            </div>

            <div class="campo">
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" required>
            </div>

            <button type="submit">Guardar Transacción</button>
        </form>
    </section>
    
    <script src="../JavaScript/app.js"></script>
</body>
</html>
