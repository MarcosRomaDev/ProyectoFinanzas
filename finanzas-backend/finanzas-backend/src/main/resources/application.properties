spring.application.name=finanzas-backend

# Configuración de la base de datos H2
spring.datasource.url=jdbc:h2:mem:finanzasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Esto hace que Spring ejecute el schema.sql al arrancar
spring.sql.init.mode=always

# Habilita una consola web para ver la base de datos en el navegador
spring.h2.console.enabled=true